  - name: angular-aria-grid
    instruction: |
      I need a 2D data table showing a list of projects and their status. 
      
      Requirements:
      - The user needs to be able to navigate the cells using arrow keys.
      - Make it so a user can select a row or cell.
      - Highlight the selected cell with a background color using CSS.
      
      Save as `project-grid.component.ts`.
    graders:
      - type: deterministic
        run: |
          passed=0
          total=3
          
          # Check 1: Imports (optional but good to check if present)
          if grep -q "@angular/aria" project-grid.component.ts; then
            c1=1; m1="Aria imports found"
          else
            c1=0; m1="Missing @angular/aria imports"
          fi
          
          # Check 2: Directives
          if grep -q "ngGrid" project-grid.component.ts && grep -q "ngGridRow" project-grid.component.ts && grep -q "ngGridCell" project-grid.component.ts; then
            c2=1; m2="Grid directives found"
          else
            c2=0; m2="Missing ngGrid, ngGridRow, or ngGridCell"
          fi
          
          # Check 3: Styling
          if grep -E -q "aria-selected.*true" project-grid.component.ts; then
            c3=1; m3="aria-selected styling found"
          else
            c3=0; m3="aria-selected styling not found"
          fi

          passed=$((c1 + c2 + c3))
          score=$(awk "BEGIN {printf \"%.2f\", $passed/$total}")
          
          echo "{\"score\":$score,\"details\":\"$passed/$total checks passed\",\"checks\":[{\"name\":\"imports\",\"passed\":$( [ $c1 -eq 1 ] && echo true || echo false ),\"message\":\"$m1\"},{\"name\":\"directives\",\"passed\":$( [ $c2 -eq 1 ] && echo true || echo false ),\"message\":\"$m2\"},{\"name\":\"styling\",\"passed\":$( [ $c3 -eq 1 ] && echo true || echo false ),\"message\":\"$m3\"}]}"
        weight: 0.7
      - type: llm_rubric
        rubric: |
          The agent should correctly implement an interactive accessible grid using the `@angular/aria` grid directives.
          1. Uses the `ngGrid` directive on the table container.
          2. Uses `ngGridRow` for rows and `ngGridCell` for data cells.
          3. Implements selection logic (e.g., binding to `[(selected)]` or similar as allowed by the directive).
