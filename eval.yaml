      Details:
      - It should show a folder called 'Documents' that can be expanded to reveal a file called 'Resume.pdf'.
      - Use CSS to indent the child items to show the hierarchy.
      - Add some CSS to rotate an arrow icon when the 'Documents' folder is expanded.
      
      Save as `file-browser.component.ts`.
    graders:
      - type: deterministic
        run: |
          passed=0
          total=3
          
          # Check 1: Imports
          if grep -q "@angular/aria/tree" file-browser.component.ts; then
            c1=1; m1="Tree imports found"
          else
            c1=0; m1="Missing @angular/aria/tree imports"
          fi
          
          # Check 2: Directives
          if grep -q "ngTree" file-browser.component.ts && grep -q "ngTreeItem" file-browser.component.ts && grep -q "ngTreeGroup" file-browser.component.ts; then
            c2=1; m2="Tree directives found"
          else
            c2=0; m2="Missing ngTree, ngTreeItem, or ngTreeGroup"
          fi
          
          # Check 3: Styling
          if grep -E -q "aria-expanded.*true" file-browser.component.ts; then
            c3=1; m3="aria-expanded styling found"
          else
            c3=0; m3="aria-expanded styling not found"
          fi

          passed=$((c1 + c2 + c3))
          score=$(awk "BEGIN {printf \"%.2f\", $passed/$total}")
          
          echo "{\"score\":$score,\"details\":\"$passed/$total checks passed\",\"checks\":[{\"name\":\"imports\",\"passed\":$( [ $c1 -eq 1 ] && echo true || echo false ),\"message\":\"$m1\"},{\"name\":\"directives\",\"passed\":$( [ $c2 -eq 1 ] && echo true || echo false ),\"message\":\"$m2\"},{\"name\":\"styling\",\"passed\":$( [ $c3 -eq 1 ] && echo true || echo false ),\"message\":\"$m3\"}]}"
        weight: 0.7
      - type: llm_rubric
        rubric: |
          The agent should correctly implement an accessible tree structure using `@angular/aria/tree`.
          1. Imports necessary directives from `@angular/aria/tree`.
          2. Structure includes a root `ngTree`, containing an `ngTreeItem` (Documents), which contains an `ngTreeGroup` (the sub-folder), which contains another `ngTreeItem` (Resume.pdf).
          3. Includes CSS to indent the nested `ngTreeGroup` (or its items).
          4. Includes CSS targeting `[aria-expanded="true"]` on the parent item to rotate the indicator icon.
